services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelai
      POSTGRES_USER: sentinelai
      POSTGRES_PASSWORD: sentinelai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
